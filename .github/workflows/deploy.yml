name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook
        env:
          STORYBOOK_DISABLE_TELEMETRY: "1"
          # Public URL of the separately-hosted imagery library (no secret).
          VITE_IMAGERY_URL: "https://epprestodesign.github.io/presto-ds-imagery"
          # Google Maps JS key for the Hotel Map pattern. Stored as a repo secret;
          # restrict it by HTTP referrer + Maps JS API in Google Cloud Console.
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

      # Standalone prototypes → deployed alongside Storybook at
      # /eventpipe-prototype-ds/prototype/. Runs AFTER build-storybook (which
      # creates storybook-static); outputs into storybook-static/prototype.
      - name: Build prototype
        run: pnpm build:prototype

      - uses: actions/upload-pages-artifact@v5
        with:
          path: storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
